# ============================================================
# Nginx 反向代理配置 - Coder 生产平台网关
# 所有服务通过单一端口 8443 (HTTPS) 访问：
#   /          → Coder 平台（管理后台 + workspace app 代理）
#   /llm/      → LiteLLM AI 网关（可选，--profile llm 启用）
#   /dex/      → Dex OIDC 提供方（可选，--profile ldap 启用）
#   /mineru/   → MinerU 文档转 Markdown（Gradio UI，--profile mineru 启用）
#   /docconv/  → Pandoc Markdown→Word/PDF（--profile doctools 启用）
#   /gitea/    → Gitea 内网 Git 平台（Skill Hub，--profile skillhub 启用）
#   /pypi/     → PyPI Mirror 离线包服务（--profile skillhub 启用）
#   /health    → 健康检查
# ============================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 75;

    # Docker 内置 DNS：用于懒解析（llm-gateway 等可选容器不存在时 nginx 仍可启动）
    resolver 127.0.0.11 valid=5s ipv6=off;

    # 大文件支持（上传固件/代码包等）
    client_max_body_size 500M;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript image/svg+xml;

    # ============================================================
    # Coder 后端（主流量）
    # ============================================================
    upstream coder_backend {
        server coder:7080;
        keepalive 64;
    }

    # WebSocket 升级映射
    map $http_upgrade $connection_upgrade {
        default  upgrade;
        ''       close;
    }

    # ============================================================
    # 主服务器（HTTPS 8443）
    # ============================================================
    server {
        listen 8443 ssl http2;
        listen [::]:8443 ssl http2;
        server_name _;

        ssl_certificate     /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:20m;
        ssl_session_timeout 1d;

        # ==================================================
        # 1. 健康检查（无认证，供 Docker healthcheck 使用）
        # ==================================================
        location = /health {
            access_log off;
            add_header Content-Type application/json;
            return 200 '{"status":"healthy"}';
        }

        # ==================================================
        # 2. LiteLLM 统一 LLM 网关（/llm/）
        #    使用变量实现懒解析：容器不存在时返回 502，不影响 nginx 启动
        #    所有 workspace 用户均可通过此路径访问内网 LLM
        # ==================================================
        location /llm/ {
            set $llm_upstream http://llm-gateway:4000;
            proxy_pass $llm_upstream/;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE（流式响应）必须关闭缓冲
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # ==================================================
        # 3. Dex OIDC 提供方（/dex/）
        #    可选，--profile ldap 启用时生效
        #    使用变量实现懒解析：Dex 容器不存在时返回 502，不影响 nginx 启动
        #    Dex issuer URL 必须含 /dex 路径前缀，与此 location 保持一致
        # ==================================================
        location /dex/ {
            set $dex_upstream http://dex:5556;
            proxy_pass $dex_upstream;
            proxy_http_version 1.1;

            proxy_set_header Host              $http_host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            # 将 Dex 内部 http:// 重定向改写为对外 https://（OIDC 授权码跳转需要）
            proxy_redirect http://$host/ https://$http_host/;

            proxy_connect_timeout  10s;
            proxy_read_timeout     30s;
            proxy_send_timeout     30s;

            proxy_buffering off;
            proxy_cache     off;
        }

        # ==================================================
        # 4. MinerU 文档转 Markdown（Gradio UI，--profile mineru）
        #    vLLM + GPU 加速，需 runtime: nvidia
        #    使用变量实现懒解析：容器不存在时返回 502，不影响 nginx 启动
        #    Gradio 依赖 WebSocket 实时推送进度，必须透传 Upgrade/Connection 头
        # ==================================================
        location /mineru/ {
            set $mineru_upstream http://mineru:7860;
            proxy_pass $mineru_upstream/;
            proxy_http_version 1.1;

            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # ==================================================
        # 5. docconv Markdown→Word/PDF（Pandoc --server，--profile doctools）
        #    使用 pandoc --server 内置 HTTP 服务器（端口 3030）
        #    支持 mathml（Word 公式）和 xelatex（PDF 公式）
        # ==================================================
        location /docconv/ {
            set $docconv_upstream http://docconv:3030;
            proxy_pass $docconv_upstream/;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # ==================================================
        # 6. Gitea 内网 Git 平台（/gitea/，--profile skillhub）
        #    Claude Code slash command / skill 市场
        #    使用变量实现懒解析：容器不存在时返回 502，不影响 nginx 启动
        #    ROOT_URL 已含 /gitea/ 路径前缀，proxy_pass 不加尾部 /
        # ==================================================
        location /gitea/ {
            set $gitea_upstream http://gitea:3000;
            proxy_pass $gitea_upstream;
            proxy_http_version 1.1;

            # Gitea CSRF 校验要求 Host 含端口
            proxy_set_header Host              $http_host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;

            # 支持 git push 大仓库
            client_max_body_size 100M;
        }

        # ==================================================
        # 7. PyPI Mirror（/pypi/，--profile skillhub）
        #    管理员浏览可用包；workspace 内部通过 Docker DNS 直接访问
        #    外网入口：https://<SERVER>:8443/pypi/simple/
        #    workspace pip：http://pypi-mirror:8080/simple/（Docker DNS 直连）
        # ==================================================
        location /pypi/ {
            set $pypi_upstream http://pypi-mirror:8080;
            proxy_pass $pypi_upstream/;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        # ==================================================
        # 8. Nginx 内部状态（仅内网访问）
        # ==================================================
        location = /nginx_status {
            stub_status on;
            access_log off;
            allow 172.28.0.0/16;
            deny all;
        }

        # ==================================================
        # 7. Coder 平台（主入口）
        #
        # 包含：
        #   /                           管理后台 + 用户仪表盘
        #   /@{user}/{workspace}.main/  workspace 访问入口
        #   /api/v2/                    REST API
        #   /bin/                       coder agent 二进制下载（workspace 容器用）
        #   /derp                       Tailscale DERP 中继（workspace 网络）
        #
        # 关键配置说明：
        #   proxy_read_timeout 86400s   Coder agent 维持长连接 WebSocket tunnel，
        #                               超时太短会导致 workspace 显示"不可达"
        #   X-Forwarded-Proto: https    告知 Coder 在 HTTPS 代理后面，
        #                               影响 init_script 生成的 URL（必须配置）
        #   Host: $http_host            包含端口号，Coder CSRF 验证需要端口一致
        # ==================================================
        location / {
            proxy_pass         http://coder_backend;
            proxy_http_version 1.1;

            # WebSocket 升级（agent tunnel、终端、workspace app 流量）
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # 必须用 $http_host（含端口），Coder 的 CSRF 检查比较 Origin 与 Host 端口
            proxy_set_header Host               $http_host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            # 关键：Coder 依据此头生成 HTTPS 的 init_script URL
            # 缺少此头会导致 agent 下载地址为 http://，workspace 容器连接失败
            proxy_set_header X-Forwarded-Proto  https;

            proxy_connect_timeout  10s;
            # 24h 超时：Coder agent 维持长连接（workspace 终端、文件同步等）
            proxy_send_timeout     86400s;
            proxy_read_timeout     86400s;

            proxy_buffering        off;
            proxy_cache            off;
            proxy_redirect         off;

            # 大型 Terraform plan 输出缓冲
            proxy_buffer_size      32k;
            proxy_buffers          8 32k;
        }
    }
}
