; ============================================================
; Gitea 配置 - Coder 内网 Skill Hub
;
; 本文件作为 Docker env vars 的补充基础配置。
; 运行时关键参数（DOMAIN、ROOT_URL、INSTALL_LOCK 等）
; 通过 GITEA__section__key 环境变量覆盖（见 docker-compose.yml）。
; ============================================================

APP_NAME = Skill Hub (Gitea)
RUN_MODE = prod

[server]
HTTP_PORT    = 3000
DISABLE_SSH  = true
; ROOT_URL 和 DOMAIN 由 docker-compose env var 覆盖

[database]
DB_TYPE = sqlite3
; PATH 由 docker-compose env var 覆盖

[repository]
; 允许从容器内本地路径导入（seed 仓库挂载为 /repos-seed）
IMPORT_LOCAL_PATHS = true
DEFAULT_PUSH_CREATE_PRIVATE = false

[security]
; INSTALL_LOCK 由 docker-compose env var 设为 true，跳过安装向导
MIN_PASSWORD_LENGTH = 6

[service]
REGISTER_EMAIL_CONFIRM    = false
ENABLE_NOTIFY_MAIL        = false
DISABLE_REGISTRATION      = false
REQUIRE_SIGNIN_VIEW       = false
ENABLE_CAPTCHA            = false
DEFAULT_KEEP_EMAIL_PRIVATE = false

[log]
MODE  = console
LEVEL = warn

[indexer]
ISSUE_INDEXER_TYPE = bleve
REPO_INDEXER_ENABLED = false
